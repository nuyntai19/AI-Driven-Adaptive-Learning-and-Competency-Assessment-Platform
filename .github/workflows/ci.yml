name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore EduTwin.sln

      - name: Build
        run: dotnet build EduTwin.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test EduTwin.sln --no-build --configuration Release --verbosity normal
